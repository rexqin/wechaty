name: Docker

on: [push, pull_request]
#   push:
#     branches:
#       - main
#       - 'v[0-9]+*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: reviewdog/action-shellcheck@v1
      - name: Install Bats
        run: |
          curl -sSL -o /tmp/bats_v0.4.0.tar.gz https://github.com/sstephenson/bats/archive/v0.4.0.tar.gz
          tar -xf /tmp/bats_v0.4.0.tar.gz
          sudo bats-0.4.0/install.sh /usr/local
      - name: Build the Docker image
        run: ./scripts/docker.sh build
      - name: Test the Docker image
        run: ./scripts/docker.sh test

  # https://www.prestonlamb.com/blog/creating-a-docker-image-with-github-actions
  publish:
    name: Publish
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/v'))
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v2

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /wechaty/ci

      - name: Validate required ACR secrets
        run: |
          test -n "${ACR_REGISTRY:-}" || { echo "::error::Infisical 缺少 ACR_REGISTRY"; exit 1; }
          test -n "${ACR_USERNAME:-}" || { echo "::error::Infisical 缺少 ACR_USERNAME"; exit 1; }
          test -n "${ACR_PASSWORD:-}" || { echo "::error::Infisical 缺少 ACR_PASSWORD"; exit 1; }
          test -n "${ACR_NAMESPACE:-}" || { echo "::error::Infisical 缺少 ACR_NAMESPACE"; exit 1; }

      - name: Normalize ACR registry hostname
        id: acr
        run: |
          set -euo pipefail
          raw="${ACR_REGISTRY#https://}"
          raw="${raw#http://}"
          host="${raw%%/*}"
          test -n "$host" || { echo "::error::无法从 ACR_REGISTRY 解析 registry 主机名"; exit 1; }
          echo "login_registry=${host}" >> "$GITHUB_OUTPUT"
          echo "image_root=${host}/${ACR_NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.login_registry }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE_ROOT: ${{ steps.acr.outputs.image_root }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version package.json)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          VERSION_TAG="${MAJOR}.${MINOR}"
          if npx --package @chatie/semver semver-is-prod "$VERSION"; then
            EXTRA_TAG=latest
          else
            EXTRA_TAG=next
          fi
          REG="${IMAGE_ROOT}"
          echo "wechaty_image=${REG}/wechaty" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${EXTRA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Wechaty image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ steps.tags.outputs.wechaty_image }}:${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.wechaty_image }}:${{ steps.tags.outputs.extra_tag }}
